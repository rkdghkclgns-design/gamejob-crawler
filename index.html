<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GameJob Crawler - 채용공고 현황</title>
<style>
  :root { --bg: #0d1117; --card: #161b22; --border: #30363d; --text: #e6edf3; --muted: #8b949e; --accent: #58a6ff; --green: #3fb950; --yellow: #d29922; --red: #f85149; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  .header { background: var(--card); border-bottom: 1px solid var(--border); padding: 20px 32px; display: flex; justify-content: space-between; align-items: flex-start; }
  .header-left h1 { font-size: 20px; font-weight: 600; }
  .header-left h1 span { color: var(--accent); }
  .header-left .meta { color: var(--muted); font-size: 13px; margin-top: 6px; }
  .header-right { display: flex; gap: 8px; align-items: center; flex-shrink: 0; }

  .btn { padding: 8px 16px; border-radius: 6px; border: 1px solid var(--border); font-size: 13px; font-weight: 600; cursor: pointer; transition: all .2s; display: inline-flex; align-items: center; gap: 6px; }
  .btn-primary { background: var(--green); color: #fff; border-color: var(--green); }
  .btn-primary:hover { background: #2ea043; }
  .btn-primary:disabled { opacity: .5; cursor: not-allowed; }
  .btn-secondary { background: transparent; color: var(--muted); }
  .btn-secondary:hover { color: var(--text); border-color: var(--text); }
  .btn-danger { background: transparent; color: var(--red); border-color: var(--red); }
  .btn-danger:hover { background: var(--red); color: #fff; }

  .spinner { width: 14px; height: 14px; border: 2px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: spin .6s linear infinite; display: none; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .toast { position: fixed; top: 20px; right: 20px; padding: 12px 20px; border-radius: 8px; font-size: 14px; z-index: 1000; animation: slideIn .3s ease; max-width: 400px; }
  .toast-success { background: #1a3a2a; border: 1px solid var(--green); color: var(--green); }
  .toast-error { background: #3a1a1a; border: 1px solid var(--red); color: var(--red); }
  .toast-info { background: #1a2a3a; border: 1px solid var(--accent); color: var(--accent); }
  @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 999; justify-content: center; align-items: center; }
  .modal-overlay.active { display: flex; }
  .modal { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 24px; max-width: 480px; width: 90%; }
  .modal h3 { font-size: 16px; margin-bottom: 12px; }
  .modal p { color: var(--muted); font-size: 13px; margin-bottom: 16px; line-height: 1.6; }
  .modal input { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 10px 12px; border-radius: 6px; font-size: 14px; margin-bottom: 16px; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
  .modal a { color: var(--accent); }

  .controls { display: flex; gap: 12px; padding: 16px 32px; flex-wrap: wrap; align-items: center; }
  .controls input, .controls select { background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 8px 12px; border-radius: 6px; font-size: 14px; }
  .controls input { flex: 1; min-width: 200px; }
  .controls select { min-width: 140px; }
  .badge { background: var(--accent); color: #fff; padding: 4px 10px; border-radius: 12px; font-size: 13px; font-weight: 600; }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 16px; padding: 0 32px 32px; }

  .card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 20px; transition: border-color .2s; cursor: pointer; text-decoration: none; color: inherit; display: block; }
  .card:hover { border-color: var(--accent); }
  .card-title { font-size: 15px; font-weight: 600; line-height: 1.4; margin-bottom: 8px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .card-company { color: var(--accent); font-size: 13px; margin-bottom: 12px; }
  .card-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
  .tag { background: #1f2937; border: 1px solid var(--border); padding: 2px 8px; border-radius: 4px; font-size: 12px; color: var(--muted); }
  .tag.exp { border-color: var(--green); color: var(--green); }
  .tag.type { border-color: var(--yellow); color: var(--yellow); }
  .tag.field { border-color: var(--accent); color: var(--accent); }
  .card-bottom { display: flex; justify-content: space-between; align-items: center; font-size: 12px; color: var(--muted); margin-top: 8px; border-top: 1px solid var(--border); padding-top: 8px; }
  .deadline { color: var(--red); font-weight: 600; }

  .empty { text-align: center; padding: 80px 32px; color: var(--muted); }
  .empty h2 { font-size: 18px; margin-bottom: 8px; }
  .loading { text-align: center; padding: 80px; color: var(--muted); }

  @media (max-width: 600px) {
    .header { flex-direction: column; gap: 12px; padding: 16px; }
    .controls { padding: 12px 16px; }
    .grid { grid-template-columns: 1fr; padding: 0 16px 16px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1><span>GameJob</span> Crawler - 채용공고 현황</h1>
    <div class="meta" id="meta">데이터 로딩 중...</div>
  </div>
  <div class="header-right">
    <button class="btn btn-primary" id="btnCrawl" onclick="triggerCrawl()">
      <span class="spinner" id="crawlSpinner"></span>
      <span id="crawlText">수동 크롤링</span>
    </button>
    <button class="btn btn-secondary" id="btnSettings" onclick="openSettings()" title="토큰 설정">&#9881;</button>
  </div>
</div>

<!-- 토큰 설정 모달 -->
<div class="modal-overlay" id="tokenModal">
  <div class="modal">
    <h3>GitHub 토큰 설정</h3>
    <p>
      크롤링을 실행하려면 GitHub Personal Access Token이 필요합니다.<br>
      <a href="https://github.com/settings/tokens/new?scopes=repo&description=GameJob+Crawler" target="_blank">여기서 토큰 생성</a> (repo 권한 체크)
    </p>
    <input type="password" id="tokenInput" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx">
    <div class="modal-actions">
      <button class="btn btn-danger" id="btnDeleteToken" onclick="deleteToken()" style="margin-right:auto;display:none;">토큰 삭제</button>
      <button class="btn btn-secondary" onclick="closeModal()">취소</button>
      <button class="btn btn-primary" onclick="saveToken()">저장</button>
    </div>
  </div>
</div>

<div class="controls">
  <input type="text" id="search" placeholder="공고 제목, 회사명, 키워드 검색...">
  <select id="filterField">
    <option value="">전체 직군</option>
  </select>
  <select id="filterExp">
    <option value="">전체 경력</option>
  </select>
  <span class="badge" id="count">-</span>
</div>

<div id="content" class="loading">로딩 중...</div>

<script>
const REPO = 'rkdghkclgns-design/gamejob-crawler';
const WORKFLOW = 'crawl.yml';
let allJobs = [];

// ─── Toast ───
function showToast(msg, type) {
  const el = document.createElement('div');
  el.className = `toast toast-${type}`;
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 4000);
}

// ─── Token ───
function getToken() { return localStorage.getItem('gh_token'); }

function openSettings() {
  const modal = document.getElementById('tokenModal');
  const input = document.getElementById('tokenInput');
  const delBtn = document.getElementById('btnDeleteToken');
  const saved = getToken();
  input.value = saved || '';
  delBtn.style.display = saved ? 'inline-flex' : 'none';
  modal.classList.add('active');
}

function closeModal() { document.getElementById('tokenModal').classList.remove('active'); }

function saveToken() {
  const val = document.getElementById('tokenInput').value.trim();
  if (!val) { showToast('토큰을 입력하세요', 'error'); return; }
  localStorage.setItem('gh_token', val);
  closeModal();
  showToast('토큰이 저장되었습니다', 'success');
}

function deleteToken() {
  localStorage.removeItem('gh_token');
  closeModal();
  showToast('토큰이 삭제되었습니다', 'info');
}

// ─── Trigger Crawl ───
async function triggerCrawl() {
  const token = getToken();
  if (!token) { openSettings(); return; }

  const btn = document.getElementById('btnCrawl');
  const spinner = document.getElementById('crawlSpinner');
  const text = document.getElementById('crawlText');

  btn.disabled = true;
  spinner.style.display = 'inline-block';
  text.textContent = '실행 중...';

  try {
    const res = await fetch(`https://api.github.com/repos/${REPO}/actions/workflows/${WORKFLOW}/dispatches`, {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${token}`, 'Accept': 'application/vnd.github+json' },
      body: JSON.stringify({ ref: 'master' }),
    });

    if (res.status === 204) {
      showToast('크롤링이 시작되었습니다! 완료까지 약 5~60분 소요됩니다.', 'success');
      text.textContent = '크롤링 진행 중...';
      pollWorkflowStatus(token);
    } else if (res.status === 401) {
      showToast('토큰이 유효하지 않습니다. 설정에서 갱신하세요.', 'error');
      btn.disabled = false; spinner.style.display = 'none'; text.textContent = '수동 크롤링';
    } else {
      const body = await res.json().catch(() => ({}));
      showToast(`실행 실패: ${body.message || res.status}`, 'error');
      btn.disabled = false; spinner.style.display = 'none'; text.textContent = '수동 크롤링';
    }
  } catch (e) {
    showToast(`네트워크 오류: ${e.message}`, 'error');
    btn.disabled = false; spinner.style.display = 'none'; text.textContent = '수동 크롤링';
  }
}

// ─── Poll Status ───
async function pollWorkflowStatus(token) {
  const btn = document.getElementById('btnCrawl');
  const spinner = document.getElementById('crawlSpinner');
  const text = document.getElementById('crawlText');

  for (let i = 0; i < 120; i++) {
    await new Promise(r => setTimeout(r, 15000));
    try {
      const res = await fetch(`https://api.github.com/repos/${REPO}/actions/runs?per_page=1&status=completed`, {
        headers: { 'Authorization': `Bearer ${token}`, 'Accept': 'application/vnd.github+json' },
      });
      const data = await res.json();
      const latest = data.workflow_runs?.[0];
      if (latest) {
        const age = (Date.now() - new Date(latest.updated_at).getTime()) / 1000;
        if (age < 60) {
          const ok = latest.conclusion === 'success';
          showToast(ok ? '크롤링 완료! 페이지를 새로고침합니다.' : `크롤링 완료 (${latest.conclusion})`, ok ? 'success' : 'error');
          btn.disabled = false; spinner.style.display = 'none'; text.textContent = '수동 크롤링';
          if (ok) setTimeout(() => location.reload(), 2000);
          return;
        }
      }
    } catch { /* ignore poll errors */ }
  }
  btn.disabled = false; spinner.style.display = 'none'; text.textContent = '수동 크롤링';
}

// ─── Data Load ───
async function loadData() {
  try {
    const res = await fetch('./all-jobs.json');
    if (!res.ok) throw new Error(res.status);
    allJobs = await res.json();
    if (!Array.isArray(allJobs)) allJobs = [];

    document.getElementById('meta').textContent =
      `총 ${allJobs.length}건 | 마지막 업데이트: ${allJobs[0]?.updatedAt || '-'}`;

    populateFilters();
    render();
  } catch (e) {
    document.getElementById('content').innerHTML =
      '<div class="empty"><h2>데이터 없음</h2><p>아직 크롤링이 실행되지 않았거나 데이터가 없습니다.<br>상단의 <b>수동 크롤링</b> 버튼을 눌러 시작하세요.</p></div>';
    document.getElementById('meta').textContent = '데이터를 불러올 수 없습니다';
  }
}

function populateFilters() {
  const fields = new Set();
  const exps = new Set();
  allJobs.forEach(j => {
    if (j.jobField) j.jobField.split(/[,/]/).forEach(f => fields.add(f.trim()));
    if (j.experience) exps.add(j.experience.trim());
  });

  const fieldSel = document.getElementById('filterField');
  [...fields].sort().forEach(f => {
    if (f) fieldSel.innerHTML += `<option value="${f}">${f}</option>`;
  });

  const expSel = document.getElementById('filterExp');
  [...exps].sort().forEach(e => {
    if (e) expSel.innerHTML += `<option value="${e}">${e}</option>`;
  });
}

function render() {
  const q = document.getElementById('search').value.toLowerCase();
  const ff = document.getElementById('filterField').value;
  const fe = document.getElementById('filterExp').value;

  const filtered = allJobs.filter(j => {
    if (q) {
      const haystack = `${j.title} ${j.company} ${j.keywords} ${j.jobField} ${j.description}`.toLowerCase();
      if (!haystack.includes(q)) return false;
    }
    if (ff && (!j.jobField || !j.jobField.includes(ff))) return false;
    if (fe && j.experience !== fe) return false;
    return true;
  });

  document.getElementById('count').textContent = `${filtered.length}건`;

  if (filtered.length === 0) {
    document.getElementById('content').innerHTML =
      '<div class="empty"><h2>검색 결과 없음</h2><p>조건을 변경해보세요.</p></div>';
    return;
  }

  const html = '<div class="grid">' + filtered.map(j => `
    <a class="card" href="${j.link || '#'}" target="_blank" rel="noopener">
      <div class="card-title">${esc(j.title)}</div>
      <div class="card-company">${esc(j.company)}</div>
      <div class="card-tags">
        ${j.jobField ? `<span class="tag field">${esc(j.jobField)}</span>` : ''}
        ${j.experience ? `<span class="tag exp">${esc(j.experience)}</span>` : ''}
        ${j.employmentType ? `<span class="tag type">${esc(j.employmentType)}</span>` : ''}
      </div>
      ${j.keywords ? `<div class="card-tags">${j.keywords.split(',').slice(0,5).map(k => `<span class="tag">${esc(k.trim())}</span>`).join('')}</div>` : ''}
      <div class="card-bottom">
        <span>${esc(j.updatedAt || '')}</span>
        <span class="deadline">${esc(j.deadline || '')}</span>
      </div>
    </a>
  `).join('') + '</div>';

  document.getElementById('content').innerHTML = html;
}

function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

document.getElementById('search').addEventListener('input', render);
document.getElementById('filterField').addEventListener('change', render);
document.getElementById('filterExp').addEventListener('change', render);

loadData();
</script>
</body>
</html>
