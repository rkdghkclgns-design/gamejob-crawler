<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GameJob Crawler - 게임잡 공고 현황</title>
<link rel="icon" href="data:,">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
  :root { --bg: #0d1117; --card: #161b22; --border: #30363d; --text: #e6edf3; --muted: #8b949e; --accent: #58a6ff; --green: #3fb950; --yellow: #d29922; --red: #f85149; --purple: #bc8cff; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  .header { background: var(--card); border-bottom: 1px solid var(--border); padding: 20px 32px; display: flex; justify-content: space-between; align-items: flex-start; }
  .header-left h1 { font-size: 20px; font-weight: 600; }
  .header-left h1 span { color: var(--accent); }
  .header-left .meta { color: var(--muted); font-size: 13px; margin-top: 6px; }
  .header-right { display: flex; gap: 8px; align-items: center; flex-shrink: 0; }

  .btn { padding: 8px 16px; border-radius: 6px; border: 1px solid var(--border); font-size: 13px; font-weight: 600; cursor: pointer; transition: all .2s; display: inline-flex; align-items: center; gap: 6px; }
  .btn-primary { background: var(--green); color: #fff; border-color: var(--green); }
  .btn-primary:hover { background: #2ea043; }
  .btn-primary:disabled { opacity: .5; cursor: not-allowed; }
  .btn-secondary { background: transparent; color: var(--muted); }
  .btn-secondary:hover { color: var(--text); border-color: var(--text); }
  .btn-danger { background: transparent; color: var(--red); border-color: var(--red); }
  .btn-danger:hover { background: var(--red); color: #fff; }
  .btn-ai { background: var(--purple); color: #fff; border-color: var(--purple); }
  .btn-ai:hover { background: #a371f7; }

  .spinner { width: 14px; height: 14px; border: 2px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: spin .6s linear infinite; display: none; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .toast { position: fixed; top: 20px; right: 20px; padding: 12px 20px; border-radius: 8px; font-size: 14px; z-index: 1000; animation: slideIn .3s ease; max-width: 400px; }
  .toast-success { background: #1a3a2a; border: 1px solid var(--green); color: var(--green); }
  .toast-error { background: #3a1a1a; border: 1px solid var(--red); color: var(--red); }
  .toast-info { background: #1a2a3a; border: 1px solid var(--accent); color: var(--accent); }
  @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 999; justify-content: center; align-items: center; }
  .modal-overlay.active { display: flex; }
  .modal { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 24px; max-width: 480px; width: 90%; }
  .modal h3 { font-size: 16px; margin-bottom: 12px; }
  .modal p { color: var(--muted); font-size: 13px; margin-bottom: 16px; line-height: 1.6; }
  .modal input[type="password"] { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 10px 12px; border-radius: 6px; font-size: 14px; margin-bottom: 16px; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
  .modal a { color: var(--accent); }

  .tab-bar { display: flex; gap: 0; padding: 0 32px; border-bottom: 1px solid var(--border); background: var(--card); }
  .tab-btn { padding: 12px 20px; font-size: 14px; font-weight: 600; color: var(--muted); background: none; border: none; border-bottom: 2px solid transparent; cursor: pointer; transition: all .2s; }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* ─── Dashboard ─── */
  .dash { padding: 24px 32px; }
  .stat-row { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; margin-bottom: 24px; }
  .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 16px; text-align: center; }
  .stat-card .num { font-size: 28px; font-weight: 700; color: var(--accent); }
  .stat-card .label { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .chart-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(min(100%, 440px), 1fr)); gap: 16px; margin-bottom: 24px; }
  .chart-row--3 { display: grid; grid-template-columns: repeat(auto-fit, minmax(min(100%, 320px), 1fr)); gap: 16px; margin-bottom: 24px; }
  .chart-row--3 .chart-box canvas { max-height: 260px !important; }
  .chart-box { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 20px; }
  .chart-box h3 { font-size: 14px; font-weight: 600; margin-bottom: 12px; color: var(--text); }
  .chart-box canvas { max-height: 360px; }
  .chart-box--tall canvas { max-height: 500px; }
  .kw-cloud { display: flex; flex-wrap: wrap; gap: 6px; max-height: 260px; overflow-y: auto; }
  .kw-tag { padding: 4px 10px; border-radius: 4px; font-weight: 600; background: #1f2937; border: 1px solid var(--border); }
  .trend-section { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 20px; margin-bottom: 24px; }
  .trend-section h3 { font-size: 14px; font-weight: 600; margin-bottom: 16px; color: var(--text); display: flex; align-items: center; gap: 8px; }
  .btn-trend { background: var(--accent); color: #fff; border-color: var(--accent); font-size: 12px; padding: 4px 12px; }
  .btn-trend:hover { background: #4393e6; }
  .btn-trend.active { background: #1a6fd4; border-color: #1a6fd4; }

  /* ─── AI Analysis ─── */
  .ai-section { background: var(--card); border: 1px solid var(--purple); border-radius: 8px; padding: 20px; margin-bottom: 24px; }
  .ai-section h3 { font-size: 14px; font-weight: 600; margin-bottom: 12px; color: var(--purple); display: flex; align-items: center; gap: 8px; }
  .ai-result { font-size: 14px; line-height: 1.8; color: var(--text); white-space: pre-wrap; }
  .ai-result p { margin-bottom: 10px; }
  .ai-placeholder { color: var(--muted); font-size: 13px; text-align: center; padding: 20px; }
  .ai-toggle { cursor: pointer; user-select: none; }
  .ai-toggle .arrow { display: inline-block; transition: transform .2s; font-size: 12px; }
  .ai-toggle.collapsed .arrow { transform: rotate(-90deg); }
  .ai-body { overflow: hidden; transition: max-height .4s ease; max-height: 5000px; }
  .ai-body.collapsed { max-height: 0 !important; padding: 0; }

  /* ─── Checkbox Dropdown ─── */
  .filter-group { position: relative; }
  .filter-toggle { background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 8px 12px; border-radius: 6px; font-size: 14px; min-width: 160px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; gap: 6px; user-select: none; }
  .filter-toggle:hover { border-color: var(--accent); }
  .filter-count { background: var(--accent); color: #fff; font-size: 11px; padding: 1px 6px; border-radius: 8px; font-weight: 700; }
  .filter-dropdown { display: none; position: absolute; top: 100%; left: 0; margin-top: 4px; background: var(--card); border: 1px solid var(--border); border-radius: 8px; min-width: 200px; z-index: 100; max-height: 280px; overflow-y: auto; padding: 6px 0; box-shadow: 0 8px 24px rgba(0,0,0,.4); }
  .filter-dropdown.open { display: block; }
  .filter-dropdown label { display: flex; align-items: center; gap: 8px; padding: 6px 14px; font-size: 13px; cursor: pointer; transition: background .15s; }
  .filter-dropdown label:hover { background: #1f2937; }
  .filter-dropdown input[type="checkbox"] { accent-color: var(--accent); width: 15px; height: 15px; cursor: pointer; }

  .controls { display: flex; gap: 12px; padding: 16px 32px; flex-wrap: wrap; align-items: center; }
  .controls input[type="text"] { background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 8px 12px; border-radius: 6px; font-size: 14px; flex: 1; min-width: 200px; }
  .badge { background: var(--accent); color: #fff; padding: 4px 10px; border-radius: 12px; font-size: 13px; font-weight: 600; }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 16px; padding: 0 32px 32px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 20px; transition: border-color .2s; cursor: pointer; text-decoration: none; color: inherit; display: block; }
  .card:hover { border-color: var(--accent); }
  .card-title { font-size: 15px; font-weight: 600; line-height: 1.4; margin-bottom: 8px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .card-company { color: var(--accent); font-size: 13px; margin-bottom: 12px; }
  .card-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
  .tag { background: #1f2937; border: 1px solid var(--border); padding: 2px 8px; border-radius: 4px; font-size: 12px; color: var(--muted); }
  .tag.exp { border-color: var(--green); color: var(--green); }
  .tag.type { border-color: var(--yellow); color: var(--yellow); }
  .tag.field { border-color: var(--accent); color: var(--accent); }
  .card-bottom { display: flex; justify-content: space-between; align-items: center; font-size: 12px; color: var(--muted); margin-top: 8px; border-top: 1px solid var(--border); padding-top: 8px; }
  .deadline { color: var(--red); font-weight: 600; }
  .empty { text-align: center; padding: 80px 32px; color: var(--muted); }
  .empty h2 { font-size: 18px; margin-bottom: 8px; }
  .loading { text-align: center; padding: 80px; color: var(--muted); }

  @media (max-width: 700px) {
    .header { flex-direction: column; gap: 12px; padding: 16px; }
    .controls { padding: 12px 16px; }
    .grid { grid-template-columns: 1fr; padding: 0 16px 16px; }
    .dash { padding: 16px; }
    .chart-row { grid-template-columns: 1fr; }
    .stat-row { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1><span>GameJob</span> Crawler - 게임잡 공고 현황</h1>
    <div class="meta" id="meta">데이터 로딩 중...</div>
  </div>
  <div class="header-right">
    <button class="btn btn-primary" id="btnCrawl" onclick="openCrawlModal()">
      <span class="spinner" id="crawlSpinner"></span>
      <span id="crawlText">수동 크롤링</span>
    </button>
  </div>
</div>

<!-- 비밀번호 + 토큰 모달 -->
<div class="modal-overlay" id="crawlModal">
  <div class="modal">
    <h3>수동 크롤링 인증</h3>
    <p>크롤링을 실행하려면 비밀번호를 입력하세요.</p>
    <input type="password" id="crawlPassword" placeholder="비밀번호 입력">
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeCrawlModal()">취소</button>
      <button class="btn btn-primary" onclick="submitCrawl()">실행</button>
    </div>
  </div>
</div>

<div class="tab-bar">
  <button class="tab-btn active" onclick="switchTab('dashboard')">게임잡 공고 현황</button>
  <button class="tab-btn" onclick="switchTab('list')">공고 목록</button>
</div>

<!-- ─── TAB 1: 게임잡 공고 현황 ─── -->
<div id="tab-dashboard" class="tab-panel active">
  <div class="dash" id="dashContent"><div class="loading">데이터 분석 중...</div></div>
</div>

<!-- ─── TAB 2: 공고 목록 ─── -->
<div id="tab-list" class="tab-panel">
  <div class="controls">
    <input type="text" id="search" placeholder="공고 제목, 회사명, 키워드 검색...">
    <!-- 직군 체크박스 드롭다운 -->
    <div class="filter-group" id="fieldFilterGroup">
      <div class="filter-toggle" onclick="toggleDropdown('fieldDrop')">
        <span id="fieldLabel">전체 직군</span>
        <span class="filter-count" id="fieldCount" style="display:none"></span>
        <span style="font-size:10px">&#9660;</span>
      </div>
      <div class="filter-dropdown" id="fieldDrop"></div>
    </div>
    <!-- 경력 체크박스 드롭다운 -->
    <div class="filter-group" id="expFilterGroup">
      <div class="filter-toggle" onclick="toggleDropdown('expDrop')">
        <span id="expLabel">전체 경력</span>
        <span class="filter-count" id="expCount" style="display:none"></span>
        <span style="font-size:10px">&#9660;</span>
      </div>
      <div class="filter-dropdown" id="expDrop"></div>
    </div>
    <span class="badge" id="count">-</span>
  </div>
  <div id="content" class="loading">로딩 중...</div>
</div>

<script>
const REPO = 'rkdghkclgns-design/gamejob-crawler';
const WORKFLOW = 'crawl.yml';
const GEMINI_PROXY = 'https://pkwbqbxuujpcvndpacsc.supabase.co/functions/v1/gemini-proxy';
const COLORS = ['#58a6ff','#3fb950','#d29922','#f85149','#bc8cff','#f778ba','#79c0ff','#56d4dd','#db6d28','#7ee787','#e3b341','#ff7b72'];
let allJobs = [];
let charts = {};
let selectedFields = new Set();
let selectedExps = new Set();

// ─── Tab ───
function switchTab(id) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', (id==='dashboard'?0:1)===i));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
}

// ─── Toast ───
function showToast(msg,type){const el=document.createElement('div');el.className=`toast toast-${type}`;el.textContent=msg;document.body.appendChild(el);setTimeout(()=>el.remove(),4000);}

// ─── Crawl Modal (비밀번호 인증) ───
const CRAWL_PASSWORD = '1124';
function openCrawlModal() {
  const m = document.getElementById('crawlModal');
  document.getElementById('crawlPassword').value = '';
  m.classList.add('active');
}
function closeCrawlModal() { document.getElementById('crawlModal').classList.remove('active'); }
function submitCrawl() {
  const pw = document.getElementById('crawlPassword').value;
  if (pw !== CRAWL_PASSWORD) { showToast('비밀번호가 올바르지 않습니다.', 'error'); return; }
  closeCrawlModal();
  triggerCrawl();
}
const DISPATCH_URL = 'https://pkwbqbxuujpcvndpacsc.supabase.co/functions/v1/github-dispatch';
async function triggerCrawl(){const btn=document.getElementById('btnCrawl'),sp=document.getElementById('crawlSpinner'),tx=document.getElementById('crawlText');btn.disabled=true;sp.style.display='inline-block';tx.textContent='실행 중...';try{const r=await fetch(DISPATCH_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({repo:REPO,workflow:WORKFLOW,ref:'master'})});const d=await r.json();if(d.success){showToast('크롤링이 시작되었습니다! (약 25분 소요)','success');tx.textContent='크롤링 진행 중...';pollWorkflowStatus();}else{showToast(`실행 실패: ${d.error||r.status}`,'error');btn.disabled=false;sp.style.display='none';tx.textContent='수동 크롤링';}}catch(e){showToast(`네트워크 오류: ${e.message}`,'error');btn.disabled=false;sp.style.display='none';tx.textContent='수동 크롤링';}}
async function pollWorkflowStatus(){const btn=document.getElementById('btnCrawl'),sp=document.getElementById('crawlSpinner'),tx=document.getElementById('crawlText');for(let i=0;i<120;i++){await new Promise(r=>setTimeout(r,15000));try{const r=await fetch(`https://api.github.com/repos/${REPO}/actions/runs?per_page=1&status=completed`);const d=await r.json();const l=d.workflow_runs?.[0];if(l){const a=(Date.now()-new Date(l.updated_at).getTime())/1000;if(a<60){const ok=l.conclusion==='success';showToast(ok?'크롤링 완료! 새로고침합니다.':'크롤링 완료 ('+l.conclusion+')',ok?'success':'error');btn.disabled=false;sp.style.display='none';tx.textContent='수동 크롤링';if(ok)setTimeout(()=>location.reload(),2000);return;}}}catch{}}btn.disabled=false;sp.style.display='none';tx.textContent='수동 크롤링';}

// ─── Helpers ───
function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}
function countMap(arr){const m={};arr.forEach(v=>{if(v)m[v]=(m[v]||0)+1});return m;}
function sorted(map,limit){return Object.entries(map).sort((a,b)=>b[1]-a[1]).slice(0,limit||999);}

// ─── Checkbox Dropdown ───
function toggleDropdown(id) {
  const el = document.getElementById(id);
  document.querySelectorAll('.filter-dropdown').forEach(d => { if(d.id !== id) d.classList.remove('open'); });
  el.classList.toggle('open');
}
document.addEventListener('click', (e) => {
  if (!e.target.closest('.filter-group')) document.querySelectorAll('.filter-dropdown').forEach(d => d.classList.remove('open'));
});

function populateFilters() {
  const fields = new Set(), exps = new Set();
  allJobs.forEach(j => {
    if (j.jobField) j.jobField.split(/[,/]/).forEach(f => { const t=f.trim(); if(t) fields.add(t); });
    if (j.experience) exps.add(j.experience.trim());
  });

  const fieldDrop = document.getElementById('fieldDrop');
  fieldDrop.innerHTML = [...fields].sort().map(f =>
    `<label><input type="checkbox" value="${esc(f)}" onchange="onFieldCheck()"> ${esc(f)}</label>`
  ).join('');

  const expDrop = document.getElementById('expDrop');
  expDrop.innerHTML = [...exps].sort().map(e =>
    `<label><input type="checkbox" value="${esc(e)}" onchange="onExpCheck()"> ${esc(e)}</label>`
  ).join('');
}

function onFieldCheck() {
  selectedFields = new Set([...document.querySelectorAll('#fieldDrop input:checked')].map(c => c.value));
  const cnt = selectedFields.size;
  document.getElementById('fieldLabel').textContent = cnt ? `직군 ${cnt}개` : '전체 직군';
  document.getElementById('fieldCount').textContent = cnt;
  document.getElementById('fieldCount').style.display = cnt ? 'inline' : 'none';
  render();
}
function onExpCheck() {
  selectedExps = new Set([...document.querySelectorAll('#expDrop input:checked')].map(c => c.value));
  const cnt = selectedExps.size;
  document.getElementById('expLabel').textContent = cnt ? `경력 ${cnt}개` : '전체 경력';
  document.getElementById('expCount').textContent = cnt;
  document.getElementById('expCount').style.display = cnt ? 'inline' : 'none';
  render();
}

// ─── AI Analysis ───
async function runAiAnalysis() {
  const btn = document.getElementById('btnAi');
  const box = document.getElementById('aiResult');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner" style="display:inline-block"></span> AI 분석 중...';
  box.innerHTML = '<div class="ai-placeholder">Gemini가 공고 데이터를 분석하고 있습니다... (약 10~30초)</div>';

  const companies = countMap(allJobs.map(j=>j.company));
  const fields = {};
  allJobs.forEach(j=>{if(j.jobField)j.jobField.split(/[,/]/).forEach(f=>{const k=f.trim();if(k)fields[k]=(fields[k]||0)+1;});});
  const exps = countMap(allJobs.map(j=>j.experience));
  const types = countMap(allJobs.map(j=>j.employmentType));
  const keywords = {};
  allJobs.forEach(j=>{if(j.keywords)j.keywords.split(',').forEach(k=>{const t=k.trim();if(t&&t.length>1)keywords[t]=(keywords[t]||0)+1;});});

  const prompt = `당신은 게임 업계 채용 시장 분석 전문가입니다. 아래는 gamejob.co.kr에서 수집한 ${allJobs.length}건의 채용공고 통계입니다.

[직군별 분포]
${sorted(fields,10).map(([k,v])=>`- ${k}: ${v}건`).join('\n')}

[경력별 분포]
${sorted(exps).map(([k,v])=>`- ${k}: ${v}건`).join('\n')}

[고용형태 분포]
${sorted(types).map(([k,v])=>`- ${k}: ${v}건`).join('\n')}

[채용 기업 Top 10]
${sorted(companies,10).map(([k,v])=>`- ${k}: ${v}건`).join('\n')}

[인기 키워드 Top 15]
${sorted(keywords,15).map(([k,v])=>`- ${k}: ${v}회`).join('\n')}

위 데이터를 기반으로 현재 게임 업계 채용 시장의 트렌드와 특징을 분석해주세요.

반드시 아래 형식으로 작성하세요:
1. **시장 개요** (2~3문장)
2. **직군별 수요 분석** (어떤 직군이 많고, 왜 그런지)
3. **경력 요구 트렌드** (신입 vs 경력, 시장의 진입장벽)
4. **고용 안정성** (정규직 vs 계약직 비율이 의미하는 것)
5. **주목할 키워드** (어떤 기술/역할이 떠오르는지)
6. **신입 취업 추천 전략** (신입/주니어가 게임 업계에 진입하기 위한 구체적 전략 3~5개. 포트폴리오 구성, 추천 스킬셋, 지원 전략, 면접 준비 등)
7. **구직자를 위한 제언** (2~3개 액션아이템)

한국어로, 게임 업계 실무자 관점에서 구체적으로 작성해주세요.`;

  try {
    const res = await fetch(GEMINI_PROXY, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'gemini-2.5-flash',
        contents: [{ parts: [{ text: prompt }] }],
        generationConfig: { temperature: 0.7 },
      }),
    });
    const data = await res.json();
    const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
    if (!text) throw new Error('응답 파싱 실패');

    box.innerHTML = '<div class="ai-result">' + text
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/^### (.+)$/gm, '<h4 style="color:var(--purple);margin:16px 0 6px">$1</h4>')
      .replace(/^## (.+)$/gm, '<h3 style="color:var(--purple);margin:16px 0 8px">$1</h3>')
      .replace(/^- (.+)$/gm, '<li style="margin-left:16px;margin-bottom:4px">$1</li>')
      .replace(/\n{2,}/g, '</p><p>')
      .replace(/\n/g, '<br>')
    + '</div>';
    // 결과 로드 후 펼치기
    document.getElementById('aiBody').classList.remove('collapsed');
    document.querySelector('.ai-toggle').classList.remove('collapsed');
  } catch (err) {
    box.innerHTML = `<div class="ai-placeholder" style="color:var(--red)">AI 분석 실패: ${esc(err.message)}</div>`;
  } finally {
    btn.disabled = false;
    btn.innerHTML = '&#10024; AI 분석';
  }
}

// ─── AI 접기/펼치기 ───
function toggleAi() {
  const t = document.querySelector('.ai-toggle');
  const b = document.getElementById('aiBody');
  b.classList.toggle('collapsed');
  t.classList.toggle('collapsed');
}

// ─── 추이보기 ───
async function loadTrend() {
  const box = document.getElementById('trendContent');
  const btn = document.getElementById('btnTrend');
  btn.disabled = true; btn.textContent = '로딩 중...';
  box.innerHTML = '<div class="ai-placeholder">히스토리 데이터를 로드하는 중...</div>';

  try {
    // 히스토리 인덱스 로드
    const idxRes = await fetch('./data/history/index.txt');
    if (!idxRes.ok) throw new Error('히스토리 데이터 없음');
    const dates = (await idxRes.text()).trim().split('\n').filter(Boolean).sort();
    if (dates.length < 1) throw new Error('히스토리 데이터가 아직 없습니다.');

    // 각 날짜 데이터 로드 (최대 30일)
    const recentDates = dates.slice(-30);
    const historyData = [];
    for (const date of recentDates) {
      try {
        const r = await fetch(`./data/history/${date}.json`);
        if (r.ok) {
          const jobs = await r.json();
          if (Array.isArray(jobs)) {
            const fields = {};
            jobs.forEach(j => { if(j.jobField) j.jobField.split(/[,\/]/).forEach(f => { const k=f.trim(); if(k) fields[k]=(fields[k]||0)+1; }); });
            historyData.push({ date, total: jobs.length, fields });
          }
        }
      } catch {}
    }

    if (historyData.length < 1) throw new Error('로드된 히스토리 없음');

    box.innerHTML = `<canvas id="chartTrend" style="max-height:350px"></canvas>`;

    // 상위 5개 직군 추출
    const allFieldCounts = {};
    historyData.forEach(d => Object.entries(d.fields).forEach(([k,v]) => allFieldCounts[k] = (allFieldCounts[k]||0)+v));
    const topFieldNames = sorted(allFieldCounts, 5).map(e => e[0]);

    const datasets = [
      { label: '전체 공고', data: historyData.map(d => d.total), borderColor: '#58a6ff', backgroundColor: '#58a6ff22', fill: true, tension: 0.3, borderWidth: 2 },
      ...topFieldNames.map((name, i) => ({
        label: name, data: historyData.map(d => d.fields[name] || 0),
        borderColor: COLORS[i+1], backgroundColor: 'transparent', tension: 0.3, borderWidth: 1.5, borderDash: [4,2],
      }))
    ];

    if (charts.trend) charts.trend.destroy();
    charts.trend = new Chart(document.getElementById('chartTrend'), {
      type: 'line',
      data: { labels: historyData.map(d => d.date), datasets },
      options: {
        responsive: true,
        plugins: { legend: { position: 'top', labels: { boxWidth: 12, padding: 8, font: { size: 11 } } } },
        scales: { x: { grid: { color: '#21262d' } }, y: { grid: { color: '#21262d' }, beginAtZero: true } },
      }
    });
  } catch (err) {
    box.innerHTML = `<div class="ai-placeholder">${esc(err.message)}<br><span style="font-size:11px;color:var(--muted)">크롤링이 2회 이상 실행된 후 추이를 볼 수 있습니다.</span></div>`;
  } finally {
    btn.disabled = false; btn.textContent = '추이보기';
  }
}

// ─── Dashboard ───
function renderDashboard() {
  if(!allJobs.length){document.getElementById('dashContent').innerHTML='<div class="empty"><h2>데이터 없음</h2></div>';return;}

  const companies = countMap(allJobs.map(j=>j.company));
  const fields = {};
  allJobs.forEach(j=>{if(j.jobField)j.jobField.split(/[,/]/).forEach(f=>{const k=f.trim();if(k)fields[k]=(fields[k]||0)+1;});});
  const exps = countMap(allJobs.map(j=>j.experience));
  const types = countMap(allJobs.map(j=>j.employmentType));
  const categories = countMap(allJobs.map(j=>j.gameCategory).filter(Boolean));
  const keywords = {};
  allJobs.forEach(j=>{if(j.keywords)j.keywords.split(',').forEach(k=>{const t=k.trim();if(t&&t.length>1)keywords[t]=(keywords[t]||0)+1;});});

  const topCompanies = sorted(companies, 15);
  const topFields = sorted(fields, 10);
  const topExps = sorted(exps);
  const topTypes = sorted(types);
  const topCategories = sorted(categories, 10);
  const topKeywords = sorted(keywords, 30);
  const uniqueCompanies = Object.keys(companies).length;

  document.getElementById('dashContent').innerHTML = `
    <div class="stat-row">
      <div class="stat-card"><div class="num">${allJobs.length}</div><div class="label">총 공고 수</div></div>
      <div class="stat-card"><div class="num">${uniqueCompanies}</div><div class="label">기업 수</div></div>
      <div class="stat-card"><div class="num">${topFields[0]?topFields[0][0]:'-'}</div><div class="label">최다 직군</div></div>
      <div class="stat-card"><div class="num">${topExps[0]?topExps[0][0]:'-'}</div><div class="label">최다 경력</div></div>
    </div>

    <!-- AI 분석 (접기/펼치기) -->
    <div class="ai-section">
      <h3 class="ai-toggle" onclick="toggleAi()"><span class="arrow">&#9660;</span> &#10024; AI 시장 분석</h3>
      <div id="aiBody" class="ai-body">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
          <span style="font-size:12px;color:var(--muted)">Gemini AI가 현재 공고 분포를 분석하여 시장 소견을 제공합니다.</span>
          <button class="btn btn-ai" id="btnAi" onclick="runAiAnalysis()">&#10024; AI 분석</button>
        </div>
        <div id="aiResult"><div class="ai-placeholder">버튼을 눌러 AI 분석을 시작하세요.</div></div>
      </div>
    </div>

    <!-- 추이보기 -->
    <div class="trend-section">
      <h3>&#128200; 공고 추이
        <button class="btn btn-trend" id="btnTrend" onclick="loadTrend()">추이보기</button>
      </h3>
      <div id="trendContent"><div class="ai-placeholder">추이보기 버튼을 눌러 날짜별 변화를 확인하세요.</div></div>
    </div>

    <div class="chart-row--3">
      <div class="chart-box"><h3>직군별 공고 분포</h3><div style="height:260px"><canvas id="chartFields"></canvas></div></div>
      <div class="chart-box"><h3>경력별 분포</h3><div style="height:260px"><canvas id="chartExp"></canvas></div></div>
      <div class="chart-box"><h3>고용형태 분포</h3><div style="height:260px"><canvas id="chartType"></canvas></div></div>
    </div>
    <div class="chart-row">
      <div class="chart-box"><h3>게임 장르 분포</h3><canvas id="chartCategory"></canvas></div>
      <div class="chart-box"><h3>직군별 요구 기술 Top 5</h3><canvas id="chartSkillByRole"></canvas></div>
    </div>
    <div class="chart-row">
      <div class="chart-box chart-box--tall"><h3>채용 기업 Top 15</h3><canvas id="chartCompany"></canvas></div>
      <div class="chart-box chart-box--tall"><h3>키워드 인기 순위 Top 30</h3><div class="kw-cloud" id="kwCloud"></div></div>
    </div>
  `;

  Chart.defaults.color = '#8b949e';
  Chart.defaults.borderColor = '#30363d';

  charts.fields = new Chart(document.getElementById('chartFields'), {
    type:'bar', data:{labels:topFields.map(e=>e[0]),datasets:[{data:topFields.map(e=>e[1]),backgroundColor:COLORS.slice(0,topFields.length),borderRadius:4}]},
    options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{color:'#21262d'}},y:{grid:{display:false},ticks:{font:{size:10}}}}}
  });
  charts.exp = new Chart(document.getElementById('chartExp'), {
    type:'doughnut', data:{labels:topExps.map(e=>e[0]),datasets:[{data:topExps.map(e=>e[1]),backgroundColor:COLORS,borderWidth:0}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{boxWidth:10,padding:6,font:{size:10}}}}}
  });
  charts.type = new Chart(document.getElementById('chartType'), {
    type:'doughnut', data:{labels:topTypes.map(e=>e[0]||'미기재'),datasets:[{data:topTypes.map(e=>e[1]),backgroundColor:COLORS.slice(2),borderWidth:0}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{boxWidth:10,padding:6,font:{size:10}}}}}
  });
  charts.category = new Chart(document.getElementById('chartCategory'), {
    type:'bar', data:{labels:topCategories.map(e=>e[0]),datasets:[{data:topCategories.map(e=>e[1]),backgroundColor:COLORS.slice(4),borderRadius:4}]},
    options:{indexAxis:'y',responsive:true,plugins:{legend:{display:false}},scales:{x:{grid:{color:'#21262d'}},y:{grid:{display:false}}}}
  });
  charts.company = new Chart(document.getElementById('chartCompany'), {
    type:'bar', data:{labels:topCompanies.map(e=>e[0]),datasets:[{data:topCompanies.map(e=>e[1]),backgroundColor:'#58a6ff',borderRadius:4}]},
    options:{indexAxis:'y',responsive:true,plugins:{legend:{display:false}},scales:{x:{grid:{color:'#21262d'}},y:{grid:{display:false},ticks:{font:{size:11}}}}}
  });

  const maxKw = topKeywords[0]?.[1] || 1;
  document.getElementById('kwCloud').innerHTML = topKeywords.map(([k,v]) => {
    const size = Math.max(11, Math.round(11 + (v/maxKw)*14));
    const ci = Math.floor((v/maxKw)*11);
    return `<span class="kw-tag" style="font-size:${size}px;color:${COLORS[ci]};border-color:${COLORS[ci]}33">${esc(k)} <small style="opacity:.6">${v}</small></span>`;
  }).join('');

  // ── 직군별 요구 기술 Top 5 (Stacked Bar) ──
  const roleSkillMap = {};
  const topRoleNames = topFields.slice(0,5).map(e=>e[0]);
  allJobs.forEach(j => {
    if (!j.jobField) return;
    j.jobField.split(/[,/]/).forEach(f => {
      const role = f.trim();
      if (!topRoleNames.includes(role)) return;
      (Array.isArray(j.reqSkills) ? j.reqSkills : []).forEach(sk => {
        if (!roleSkillMap[role]) roleSkillMap[role] = {};
        roleSkillMap[role][sk] = (roleSkillMap[role][sk] || 0) + 1;
      });
    });
  });
  // 상위 5개 기술만 추출
  const allSkillSet = new Set();
  const roleTopSkills = {};
  topRoleNames.forEach(role => {
    const sk = roleSkillMap[role] || {};
    roleTopSkills[role] = sorted(sk, 5);
    roleTopSkills[role].forEach(([s]) => allSkillSet.add(s));
  });
  const skillLabels = [...allSkillSet].slice(0, 12);
  const roleDatasets = topRoleNames.map((role, i) => ({
    label: role,
    data: skillLabels.map(sk => (roleSkillMap[role] || {})[sk] || 0),
    backgroundColor: COLORS[i],
    borderRadius: 3,
  }));

  charts.skillByRole = new Chart(document.getElementById('chartSkillByRole'), {
    type: 'bar',
    data: { labels: skillLabels, datasets: roleDatasets },
    options: {
      responsive: true,
      plugins: { legend: { position: 'top', labels: { boxWidth: 10, padding: 6, font: { size: 10 } } } },
      scales: { x: { grid: { color: '#21262d' }, ticks: { font: { size: 9 }, maxRotation: 45 } }, y: { grid: { color: '#21262d' }, beginAtZero: true } },
    },
  });
}

// ─── List ───
function render() {
  const q = document.getElementById('search').value.toLowerCase();
  const filtered = allJobs.filter(j => {
    if (q) { const h=`${j.title} ${j.company} ${j.keywords} ${j.jobField} ${j.description}`.toLowerCase(); if(!h.includes(q)) return false; }
    if (selectedFields.size > 0 && (!j.jobField || ![...selectedFields].some(f => j.jobField.includes(f)))) return false;
    if (selectedExps.size > 0 && !selectedExps.has(j.experience)) return false;
    return true;
  });
  document.getElementById('count').textContent = `${filtered.length}건`;
  if (!filtered.length) { document.getElementById('content').innerHTML='<div class="empty"><h2>검색 결과 없음</h2><p>조건을 변경해보세요.</p></div>'; return; }
  document.getElementById('content').innerHTML = '<div class="grid">' + filtered.map(j =>
    `<a class="card" href="${j.link||'#'}" target="_blank" rel="noopener"><div class="card-title">${esc(j.title)}</div><div class="card-company">${esc(j.company)}</div><div class="card-tags">${j.jobField?`<span class="tag field">${esc(j.jobField)}</span>`:''}${j.experience?`<span class="tag exp">${esc(j.experience)}</span>`:''}${j.employmentType?`<span class="tag type">${esc(j.employmentType)}</span>`:''}</div>${j.keywords?`<div class="card-tags">${j.keywords.split(',').slice(0,5).map(k=>`<span class="tag">${esc(k.trim())}</span>`).join('')}</div>`:''}<div class="card-bottom"><span>${esc(j.updatedAt||'')}</span><span class="deadline">${esc(j.deadline||'')}</span></div></a>`
  ).join('') + '</div>';
}

// ─── Load ───
async function loadData() {
  try {
    const [jobsRes, idxRes] = await Promise.all([
      fetch('./all-jobs.json'),
      fetch('./data/history/index.txt').catch(() => null),
    ]);
    if (!jobsRes.ok) throw new Error(jobsRes.status);
    allJobs = await jobsRes.json();
    if (!Array.isArray(allJobs)) allJobs = [];

    // 최신 크롤링 날짜 = 히스토리 인덱스의 마지막 항목
    let latestDate = '-';
    if (idxRes && idxRes.ok) {
      const dates = (await idxRes.text()).trim().split('\n').filter(Boolean).sort();
      if (dates.length > 0) latestDate = dates[dates.length - 1];
    }
    document.getElementById('meta').textContent = `총 ${allJobs.length}건 | 마지막 크롤링: ${latestDate}`;
    populateFilters(); render(); renderDashboard();
  } catch(e) {
    document.getElementById('content').innerHTML='<div class="empty"><h2>데이터 없음</h2><p>상단의 <b>수동 크롤링</b> 버튼을 눌러 시작하세요.</p></div>';
    document.getElementById('dashContent').innerHTML='<div class="empty"><h2>데이터 없음</h2></div>';
    document.getElementById('meta').textContent='데이터를 불러올 수 없습니다';
  }
}

document.getElementById('search').addEventListener('input', render);
loadData();
</script>
