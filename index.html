<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GameJob Crawler - 채용공고 현황</title>
<style>
  :root { --bg: #0d1117; --card: #161b22; --border: #30363d; --text: #e6edf3; --muted: #8b949e; --accent: #58a6ff; --green: #3fb950; --yellow: #d29922; --red: #f85149; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  .header { background: var(--card); border-bottom: 1px solid var(--border); padding: 20px 32px; }
  .header h1 { font-size: 20px; font-weight: 600; }
  .header h1 span { color: var(--accent); }
  .header .meta { color: var(--muted); font-size: 13px; margin-top: 6px; }

  .controls { display: flex; gap: 12px; padding: 16px 32px; flex-wrap: wrap; align-items: center; }
  .controls input, .controls select { background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 8px 12px; border-radius: 6px; font-size: 14px; }
  .controls input { flex: 1; min-width: 200px; }
  .controls select { min-width: 140px; }
  .badge { background: var(--accent); color: #fff; padding: 4px 10px; border-radius: 12px; font-size: 13px; font-weight: 600; }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 16px; padding: 0 32px 32px; }

  .card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 20px; transition: border-color .2s; cursor: pointer; text-decoration: none; color: inherit; display: block; }
  .card:hover { border-color: var(--accent); }
  .card-title { font-size: 15px; font-weight: 600; line-height: 1.4; margin-bottom: 8px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .card-company { color: var(--accent); font-size: 13px; margin-bottom: 12px; }
  .card-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
  .tag { background: #1f2937; border: 1px solid var(--border); padding: 2px 8px; border-radius: 4px; font-size: 12px; color: var(--muted); }
  .tag.exp { border-color: var(--green); color: var(--green); }
  .tag.type { border-color: var(--yellow); color: var(--yellow); }
  .tag.field { border-color: var(--accent); color: var(--accent); }
  .card-bottom { display: flex; justify-content: space-between; align-items: center; font-size: 12px; color: var(--muted); margin-top: 8px; border-top: 1px solid var(--border); padding-top: 8px; }
  .deadline { color: var(--red); font-weight: 600; }

  .empty { text-align: center; padding: 80px 32px; color: var(--muted); }
  .empty h2 { font-size: 18px; margin-bottom: 8px; }
  .loading { text-align: center; padding: 80px; color: var(--muted); }

  @media (max-width: 600px) {
    .controls { padding: 12px 16px; }
    .grid { grid-template-columns: 1fr; padding: 0 16px 16px; }
    .header { padding: 16px; }
  }
</style>
</head>
<body>

<div class="header">
  <h1><span>GameJob</span> Crawler - 채용공고 현황</h1>
  <div class="meta" id="meta">데이터 로딩 중...</div>
</div>

<div class="controls">
  <input type="text" id="search" placeholder="공고 제목, 회사명, 키워드 검색...">
  <select id="filterField">
    <option value="">전체 직군</option>
  </select>
  <select id="filterExp">
    <option value="">전체 경력</option>
  </select>
  <span class="badge" id="count">-</span>
</div>

<div id="content" class="loading">로딩 중...</div>

<script>
let allJobs = [];

async function loadData() {
  try {
    const res = await fetch('./all-jobs.json');
    if (!res.ok) throw new Error(res.status);
    allJobs = await res.json();
    if (!Array.isArray(allJobs)) allJobs = [];

    document.getElementById('meta').textContent =
      `총 ${allJobs.length}건 | 마지막 업데이트: ${allJobs[0]?.updatedAt || '-'}`;

    populateFilters();
    render();
  } catch (e) {
    document.getElementById('content').innerHTML =
      '<div class="empty"><h2>데이터 없음</h2><p>아직 크롤링이 실행되지 않았거나 데이터가 없습니다.<br>GitHub Actions에서 워크플로우를 실행해주세요.</p></div>';
    document.getElementById('meta').textContent = '데이터를 불러올 수 없습니다';
  }
}

function populateFilters() {
  const fields = new Set();
  const exps = new Set();
  allJobs.forEach(j => {
    if (j.jobField) j.jobField.split(/[,/]/).forEach(f => fields.add(f.trim()));
    if (j.experience) exps.add(j.experience.trim());
  });

  const fieldSel = document.getElementById('filterField');
  [...fields].sort().forEach(f => {
    if (f) fieldSel.innerHTML += `<option value="${f}">${f}</option>`;
  });

  const expSel = document.getElementById('filterExp');
  [...exps].sort().forEach(e => {
    if (e) expSel.innerHTML += `<option value="${e}">${e}</option>`;
  });
}

function render() {
  const q = document.getElementById('search').value.toLowerCase();
  const ff = document.getElementById('filterField').value;
  const fe = document.getElementById('filterExp').value;

  const filtered = allJobs.filter(j => {
    if (q) {
      const haystack = `${j.title} ${j.company} ${j.keywords} ${j.jobField} ${j.description}`.toLowerCase();
      if (!haystack.includes(q)) return false;
    }
    if (ff && (!j.jobField || !j.jobField.includes(ff))) return false;
    if (fe && j.experience !== fe) return false;
    return true;
  });

  document.getElementById('count').textContent = `${filtered.length}건`;

  if (filtered.length === 0) {
    document.getElementById('content').innerHTML =
      '<div class="empty"><h2>검색 결과 없음</h2><p>조건을 변경해보세요.</p></div>';
    return;
  }

  const html = '<div class="grid">' + filtered.map(j => `
    <a class="card" href="${j.link || '#'}" target="_blank" rel="noopener">
      <div class="card-title">${esc(j.title)}</div>
      <div class="card-company">${esc(j.company)}</div>
      <div class="card-tags">
        ${j.jobField ? `<span class="tag field">${esc(j.jobField)}</span>` : ''}
        ${j.experience ? `<span class="tag exp">${esc(j.experience)}</span>` : ''}
        ${j.employmentType ? `<span class="tag type">${esc(j.employmentType)}</span>` : ''}
      </div>
      ${j.keywords ? `<div class="card-tags">${j.keywords.split(',').slice(0,5).map(k => `<span class="tag">${esc(k.trim())}</span>`).join('')}</div>` : ''}
      <div class="card-bottom">
        <span>${esc(j.updatedAt || '')}</span>
        <span class="deadline">${esc(j.deadline || '')}</span>
      </div>
    </a>
  `).join('') + '</div>';

  document.getElementById('content').innerHTML = html;
}

function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

document.getElementById('search').addEventListener('input', render);
document.getElementById('filterField').addEventListener('change', render);
document.getElementById('filterExp').addEventListener('change', render);

loadData();
</script>
</body>
</html>
