name: GameJob Daily Crawl

on:
  schedule:
    # 매일 00:00 UTC = 09:00 KST
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      tags:
        description: '크롤링 태그 (공백 구분, 예: 게임기획 신입)'
        required: false
        default: ''

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run crawler
        run: node crawler.js ${{ github.event.inputs.tags || '' }}

      - name: Upload crawled data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gamejob-data-${{ github.run_number }}
          path: data/
          retention-days: 30
