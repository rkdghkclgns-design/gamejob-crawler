name: GameJob Daily Crawl

on:
  schedule:
    # 매일 00:00 UTC = 09:00 KST
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      tags:
        description: '크롤링 태그 (공백 구분, 예: 게임기획 신입)'
        required: false
        default: ''

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run crawler
        run: node crawler.js ${{ github.event.inputs.tags || '' }}

      - name: Save daily snapshot
        if: always()
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          mkdir -p data/history
          if [ -f data/jobs/all-jobs.json ]; then
            cp data/jobs/all-jobs.json "data/history/${TODAY}.json"
            echo "[INFO] Saved daily snapshot: data/history/${TODAY}.json"
          fi

      - name: Commit crawled data
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/history/
          if git diff --cached --quiet; then
            echo "No data changes to commit"
          else
            TODAY=$(date -u +%Y-%m-%d)
            git commit -m "data: ${TODAY} 크롤링 데이터 업데이트"
            git push
          fi

      - name: Upload crawled data artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gamejob-data-${{ github.run_number }}
          path: data/
          retention-days: 30

      - name: Prepare Pages site
        if: always()
        run: |
          mkdir -p _site/data/history
          cp index.html _site/
          if [ -f data/jobs/all-jobs.json ] && [ "$(wc -c < data/jobs/all-jobs.json)" -gt 10 ]; then
            cp data/jobs/all-jobs.json _site/
          else
            # 크롤링 실패 시 최신 히스토리 데이터를 사용
            LATEST=$(ls -1 data/history/*.json 2>/dev/null | sort | tail -1)
            if [ -n "$LATEST" ] && [ "$(wc -c < "$LATEST")" -gt 10 ]; then
              echo "[INFO] 크롤링 실패 — 최신 히스토리 사용: $LATEST"
              cp "$LATEST" _site/all-jobs.json
            else
              echo "[WARN] 사용 가능한 데이터 없음"
              echo "[]" > _site/all-jobs.json
            fi
          fi
          # 히스토리 데이터 복사
          if ls data/history/*.json 1>/dev/null 2>&1; then
            cp data/history/*.json _site/data/history/
            # 히스토리 인덱스 생성
            ls -1 data/history/*.json | xargs -I{} basename {} .json | sort > _site/data/history/index.txt
          fi

      - name: Upload Pages artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site/

  deploy:
    needs: crawl
    if: always()
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    permissions:
      pages: write
      id-token: write

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
